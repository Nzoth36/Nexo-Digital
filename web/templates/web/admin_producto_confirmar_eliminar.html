{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar producto - Nexo Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body>
    <div class="main-content" style="margin-left: 0; max-width: 700px;">
        <div class="content-card">
            <h3 class="fw-bold">Eliminar producto</h3>
            <p>¿Seguro que deseas eliminar el producto <strong>{{ producto.nombre }}</strong>?</p>
            <p class="text-muted">Esta acción no se puede deshacer.</p>

            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'web:admin' %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
